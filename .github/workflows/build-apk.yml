name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Verify Build Environment
      run: |
        echo "::group::Environment Information"
        echo "Java Version:"
        java -version
        echo ""
        echo "Gradle Version:"
        ./gradlew --version
        echo ""
        echo "Build Environment:"
        echo "  OS: $(uname -s)"
        echo "  Architecture: $(uname -m)"
        echo "  Available Memory: $(free -h | awk '/^Mem:/ {print $2}')"
        echo "  Available Disk: $(df -h . | awk 'NR==2 {print $4}')"
        echo "::endgroup::"

    - name: Grant execute permission for gradlew and scripts
      run: |
        chmod +x gradlew
        chmod +x scripts/monitor-build.sh

    - name: Build Debug APK with Active Monitoring
      run: |
        echo "::group::Active Build Monitoring"
        echo "Starting monitored build at $(date '+%Y-%m-%d %H:%M:%S')"
        echo ""

        # Run the monitoring script
        ./scripts/monitor-build.sh assembleDebug

        BUILD_STATUS=$?
        echo ""
        echo "::endgroup::"

        if [ $BUILD_STATUS -ne 0 ]; then
          echo "::error::Build failed with exit code $BUILD_STATUS"
          exit $BUILD_STATUS
        fi

        echo "::notice::Build completed successfully"

    - name: Verify APK Output
      run: |
        echo "::group::APK Verification"
        APK_DIR="app/build/outputs/apk/debug"

        # Find the actual APK file (it may have a custom name)
        APK_PATH=$(find "$APK_DIR" -name "*.apk" -type f | head -1)

        if [ -n "$APK_PATH" ] && [ -f "$APK_PATH" ]; then
          APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
          APK_NAME=$(basename "$APK_PATH")
          echo "✓ APK generated successfully"
          echo "  Path: $APK_PATH"
          echo "  Name: $APK_NAME"
          echo "  Size: $APK_SIZE"

          # Get APK info using aapt if available
          if command -v aapt &> /dev/null; then
            echo ""
            echo "APK Information:"
            aapt dump badging "$APK_PATH" | grep -E "package:|sdkVersion:|targetSdkVersion:" || true
          fi
        else
          echo "::error::APK not found in directory: $APK_DIR"
          ls -la "$APK_DIR" || echo "Directory does not exist"
          exit 1
        fi
        echo "::endgroup::"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk

    - name: Upload Build Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: build-monitor-*.log
        if-no-files-found: ignore
